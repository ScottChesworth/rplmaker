name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Tag builds attach the portable zips to a GitHub Release.
permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The integration tests are driven by the Examples/ vendor preset files,
      # which are other people's factory presets and are not committed (see
      # .gitignore). Without them those tests skip themselves, so this job
      # proves the workspace compiles and clippy is clean, but it does NOT
      # exercise the converter. Run `cargo test` locally, where Examples/
      # exists, before trusting a change.
      - name: Test (fixture-backed tests skip without Examples/)
        run: cargo test --workspace --exclude rplmaker-gui
      - name: Clippy
        run: cargo clippy --workspace --exclude rplmaker-gui

  windows:
    name: Windows portable
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # The Tauri frontend is embedded into the exe at build time, so the GUI
      # is a single self-contained file: no installer, nothing to unpack.
      - name: Build GUI and CLI
        run: |
          cargo build --release -p rplmaker-gui
          cargo build --release -p rplmaker-cli

      # The CLI is staged as rplmaker-cli.exe, not rplmaker.exe: Windows
      # filenames are case-insensitive, so rplmaker.exe would be the same file
      # as the GUI's rplMaker.exe and would silently overwrite it.
      - name: Stage portable folder
        shell: bash
        run: |
          mkdir -p dist/rplMaker
          cp target/release/rplmaker-gui.exe dist/rplMaker/rplMaker.exe
          cp target/release/rplmaker.exe dist/rplMaker/rplmaker-cli.exe
          cp README.md GUIDE.md LICENSE dist/rplMaker/

      # The GUI links a webview and is several MB; the CLI is under 1 MB. A
      # tiny "GUI" means the wrong binary got staged, which is easy to miss by
      # eye but ships a console tool to people expecting an app.
      - name: Verify the staged GUI really is the GUI
        shell: bash
        run: |
          size=$(stat -c%s dist/rplMaker/rplMaker.exe)
          echo "rplMaker.exe is $size bytes"
          if [ "$size" -lt 2000000 ]; then
            echo "::error::rplMaker.exe is only $size bytes - the GUI was not staged correctly"
            exit 1
          fi
          test -f dist/rplMaker/rplmaker-cli.exe

      - name: Zip
        shell: bash
        run: cd dist && 7z a -tzip ../rplMaker-windows-x64-portable.zip rplMaker

      - uses: actions/upload-artifact@v4
        with:
          name: rplMaker-windows-x64-portable
          path: rplMaker-windows-x64-portable.zip

  macos:
    name: macOS portable
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # A macOS GUI needs a real .app bundle; universal so it runs on both
      # Apple Silicon and Intel. --bundles app skips the dmg installer.
      - name: Build universal .app
        working-directory: src-tauri
        run: cargo tauri build --bundles app --target universal-apple-darwin

      - name: Build CLI (universal)
        run: |
          cargo build --release -p rplmaker-cli --target aarch64-apple-darwin
          cargo build --release -p rplmaker-cli --target x86_64-apple-darwin

      - name: Stage portable folder
        run: |
          mkdir -p dist/rplMaker
          APP=$(find target -type d -name "rplMaker.app" | head -1)
          if [ -z "$APP" ]; then echo "::error::no .app bundle was produced"; exit 1; fi
          cp -R "$APP" dist/rplMaker/
          lipo -create -output dist/rplMaker/rplmaker \
            target/aarch64-apple-darwin/release/rplmaker \
            target/x86_64-apple-darwin/release/rplmaker
          cp README.md GUIDE.md LICENSE dist/rplMaker/

      - name: Verify the bundled app really is the GUI
        run: |
          bin="dist/rplMaker/rplMaker.app/Contents/MacOS/rplmaker-gui"
          size=$(stat -f%z "$bin")
          echo "bundled GUI is $size bytes"
          if [ "$size" -lt 2000000 ]; then
            echo "::error::bundled GUI is only $size bytes - wrong binary staged"
            exit 1
          fi
          lipo -archs "$bin"

      # ditto preserves the bundle's symlinks and metadata; a plain zip can
      # corrupt a .app. --keepParent makes the zip unpack to an rplMaker
      # folder rather than scattering files into the download directory.
      - name: Zip
        run: ditto -c -k --sequesterRsrc --keepParent dist/rplMaker rplMaker-macos-universal-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: rplMaker-macos-universal-portable
          path: rplMaker-macos-universal-portable.zip

  # One job publishes, after both builds are in. Attaching from each platform
  # job instead would have them race to create the same release.
  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Attach portable builds to the release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          # Tags carrying a suffix (v0.1.0-beta1) are pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
